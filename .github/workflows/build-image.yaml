permissions:
  contents: read
  packages: write

name: Build Workflow

on:
  push:
    branches:
      - main
      - dev

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ghcr.io/BOPP-CRM/bopp-odoo:${{ github.sha }} .

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push ghcr.io/BOPP-CRM/bopp-odoo:${{ github.sha }}

      - name: Tag and push branch-specific tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ghcr.io/BOPP-CRM/bopp-odoo:${{ github.sha }} ghcr.io/BOPP-CRM/bopp-odoo:latest
            docker push ghcr.io/BOPP-CRM/bopp-odoo:latest
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker tag ghcr.io/BOPP-CRM/bopp-odoo:${{ github.sha }} ghcr.io/BOPP-CRM/bopp-odoo:dev
            docker push ghcr.io/BOPP-CRM/bopp-odoo:dev
          fi
